name: OregonTrailIOS
options:
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.oregontrail.ios
    SWIFT_VERSION: 5.0
targets:
  OregonTrailApp:
    type: application
    platform: iOS
    sources:
      - OregonTrailApp
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_CFBundleDisplayName: Oregon Trail
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
